name: tally_coding_app
description: "Tally Coding — privacy-first multi-agent coding workspace"
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  # Sprint 32.5: deep-link callback for Clerk OAuth flow. Used by the
  # `tallycoding://auth/oauth` redirect that closes the browser-based
  # sign-in loop on every platform (Android, iOS, Linux, macOS, Windows).
  app_links: ^6.4.1

  # Sprint 32.5: Clerk SDK for in-app sign-in. With redirectionGenerator +
  # deepLinkStream wired (see main.dart), Clerk routes OAuth through the
  # system browser via url_launcher and catches the redirect back via
  # app_links — no platform-specific webview required.
  clerk_flutter: ^0.0.15-beta
  clerk_auth: ^0.0.15-beta

  # Skytale Dart SDK — E2E encryption + agent identity. Currently a skeleton
  # awaiting PR #469 merge; pinned to the branch until then.
  skytale_sdk:
    git:
      url: https://github.com/nicholasraimbault/skytale.git
      ref: dart-sdk-skeleton
      path: sdk/dart

  # Sprint 46: notification + push + WebSocket
  web_socket_channel: ^3.0.0
  unifiedpush: ^5.0.0
  flutter_local_notifications: ^17.2.0
  vyuh_node_flow: ^0.27.3
  flutter_mobx: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
